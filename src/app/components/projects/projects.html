<section class="py-5 bg-light" id="projects">
  <div class="container py-5">
    <div class="text-center mb-5">
      <h2 class="fw-bold display-5">Featured Projects</h2>
      <p class="text-muted">Swipe through some of my favorite builds</p>
    </div>

    <div id="projectCarousel" class="carousel carousel-dark slide shadow-sm rounded-4 bg-white p-4 p-md-5" data-bs-ride="carousel">
      
      <div class="carousel-indicators">
        <button *ngFor="let project of projects; let i = index" 
                type="button" 
                data-bs-target="#projectCarousel" 
                [attr.data-bs-slide-to]="i" 
                [class.active]="i === 0"
                [attr.aria-current]="i === 0 ? 'true' : null">
        </button>
      </div>

      <div class="carousel-inner">
        <div class="carousel-item" *ngFor="let project of projects; let i = index" [class.active]="i === 0">
          <div class="row align-items-center g-4">
            
            <div class="col-lg-6">
              <div class="project-img-container rounded-4 shadow-sm overflow-hidden">
                <img [src]="project.image" class="d-block w-100" [alt]="project.title">
              </div>
            </div>

            <div class="col-lg-6 px-lg-5">
              <div class="p-2">
                <h3 class="fw-bold mb-3 text-dark">{{project.title}}</h3>
                <p class="text-muted mb-4 lead" style="font-size: 1.1rem;">
                  {{project.description}}
                </p>
                <div class="mb-4">
                  <span *ngFor="let tech of project.tags" 
                        class="badge bg-primary-subtle text-primary border border-primary-subtle me-2 px-3 py-2 rounded-pill">
                    {{tech}}
                  </span>
                </div>
                <div class="d-flex gap-3">
                  <a [href]="project.liveLink" appRipple class="btn btn-primary px-4 rounded-pill">Live Demo</a>
                  <a [href]="project.repoLink" class="btn btn-outline-dark px-4 rounded-pill">GitHub</a>
                </div>
              </div>
            </div>

          </div>
        </div>
      </div>

      <button class="carousel-control-prev" type="button" data-bs-target="#projectCarousel" data-bs-slide="prev">
        <span class="carousel-control-prev-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Previous</span>
      </button>
      <button class="carousel-control-next" type="button" data-bs-target="#projectCarousel" data-bs-slide="next">
        <span class="carousel-control-next-icon" aria-hidden="true"></span>
        <span class="visually-hidden">Next</span>
      </button>

    </div>
  </div>
</section>
