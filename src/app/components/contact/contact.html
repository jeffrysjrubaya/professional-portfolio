<section class="py-5 bg-light" id="contact">
  <div class="container py-5">
    <div class="row g-5">
      
      <div class="col-lg-5">
        <h2 class="fw-bold mb-4">Let's <span class="text-primary">Connect</span></h2>
        <p class="text-muted mb-5">
          I'm currently looking for new opportunities and collaborations. Whether you have a question about my projects or just want to say hi, my inbox is always open!
        </p>
        
        <div class="d-flex align-items-center mb-4">
          <div class="icon-box bg-white shadow-sm rounded-circle me-3">
            <i class="bi bi-envelope-fill text-primary"></i>
          </div>
          <div>
            <p class="mb-0 text-muted small">Email Me</p>
            <a href="mailto:jeffry.sj.rubaya@gmail.com" class="text-dark fw-bold text-decoration-none">jeffry.sj.rubaya@gmail.com</a>
          </div>
        </div>

        <div class="d-flex align-items-center mb-4">
          <div class="icon-box bg-white shadow-sm rounded-circle me-3">
            <i class="bi bi-linkedin text-primary"></i>
          </div>
          <div>
            <p class="mb-0 text-muted small">LinkedIn</p>
            <a target="_blank" href="https://www.linkedin.com/in/jeffrysjrubaya/" class="text-dark fw-bold text-decoration-none">linkedin.com/in/jeffrysjrubaya</a>
          </div>
        </div>

        <div class="d-flex align-items-center">
          <div class="icon-box bg-white shadow-sm rounded-circle me-3">
            <i class="bi bi-github text-primary"></i>
          </div>
          <div>
            <p class="mb-0 text-muted small">GitHub</p>
            <a href="#" class="text-dark fw-bold text-decoration-none">github.com/yourusername</a>
          </div>
        </div>
      </div>

      <div class="col-lg-7">
        <div class="card border-0 shadow-sm p-4 rounded-4">
          <form>
            <div class="row g-3">
              <div class="col-md-6">
                <div class="form-floating mb-3">
                  <input type="text" class="form-control border-0 bg-light" id="name" placeholder="Name">
                  <label for="name">Your Name</label>
                </div>
              </div>
              <div class="col-md-6">
                <div class="form-floating mb-3">
                  <input type="email" class="form-control border-0 bg-light" id="email" placeholder="Email">
                  <label for="email">Email Address</label>
                </div>
              </div>
              <div class="col-12">
                <div class="form-floating mb-3">
                  <input type="text" class="form-control border-0 bg-light" id="subject" placeholder="Subject">
                  <label for="subject">Subject</label>
                </div>
              </div>
              <div class="col-12">
                <div class="form-floating mb-4">
                  <textarea class="form-control border-0 bg-light" id="message" placeholder="Message" style="height: 150px"></textarea>
                  <label for="message">Your Message</label>
                </div>
              </div>
              <div class="col-12">
                <button appRipple type="submit" class="btn btn-primary btn-lg w-100 rounded-pill py-3 fw-bold">
                  Send Message
                </button>
              </div>
            </div>
          </form>
        </div>
      </div>

    </div>
  </div>
</section>
